zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: 883349b89d37470b8db4ee07483559d4
      template: 'PowerDNS Authoritative Server'
      name: 'PowerDNS Authoritative Server'
      description: |
        Zabbix template to monitor PowerDNS Authoritative Server via its Prometheus metrics endpoint using Zabbix Agent 2.

        Collects all metrics through a single master item and extracts individual values with Prometheus preprocessing.

        Source: https://github.com/zabbix/community-templates/

        Author: Joël de Jager
      groups:
        - name: Templates/Applications
      items:
        # ── Process ────────────────────────────────────────────────────
        - uuid: 4346050f3f514c93bfea310aabc3a3d4
          name: 'pdns_auth Process'
          type: ZABBIX_ACTIVE
          key: 'proc.num[,,,pdns_server]'
          delay: 60s
          description: 'Number of running pdns_server processes.'
          valuemap:
            name: 'Service Status'
          triggers:
            - uuid: d61d827b1b294324beb79497c3efabf7
              expression: 'last(/PowerDNS Authoritative Server/proc.num[,,,pdns_server])=0'
              name: 'pdns_auth process not running'
              priority: HIGH
        # ── Master item ────────────────────────────────────────────────
        - uuid: 8b6b7f8e318b41978f2117d3425532e0
          name: 'Prometheus Metrics'
          type: ZABBIX_ACTIVE
          key: pdns.auth.metrics
          delay: 30s
          history: 0d
          trends: 0d
          value_type: TEXT
          description: 'Raw Prometheus metrics from the PowerDNS Authoritative Server web API.'
          tags:
            - tag: component
              value: raw
        # ── Queries & Responses ────────────────────────────────────────
        - uuid: 408a4c9ff63f4d9db8a2b67aca614926
          name: 'Backend Queries'
          type: DEPENDENT
          key: pdns.auth.backend.queries
          value_type: FLOAT
          description: 'Number of queries sent to the backend(s).'
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - pdns_auth_backend_queries
                - value
                - ''
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: SIMPLE_CHANGE
          master_item:
            key: pdns.auth.metrics
          tags:
            - tag: component
              value: queries
        - uuid: 999a615ab97c41a784233a413389c5c8
          name: 'UDP Queries'
          type: DEPENDENT
          key: pdns.auth.udp.queries
          value_type: FLOAT
          description: 'Number of UDP queries received.'
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - pdns_auth_udp_queries
                - value
                - ''
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
