zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: 4f20a43639ea4ca3b1fed1f8f5ee368d
      template: 'PowerDNS dnsdist'
      name: 'PowerDNS dnsdist'
      description: |
        Zabbix template to monitor PowerDNS dnsdist via its Prometheus metrics endpoint using Zabbix Agent 2.
        
        Collects all metrics through a single master item and extracts individual values with Prometheus preprocessing.
        
        Source: https://github.com/zabbix/community-templates/
        
        Author: Joël de Jager (rewrite), Manuel Frei (original)
      groups:
        - name: Templates/Applications
      items:
        - uuid: 4c6950f1d62a4df38092adae53cd062b
          name: 'ACL Drops'
          type: DEPENDENT
          key: pdns.dnsdist.acl.drops
          value_type: FLOAT
          description: 'Number of packets dropped because of the ACL.'
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - dnsdist_acl_drops
                - value
                - ''
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: SIMPLE_CHANGE
          master_item:
            key: pdns.dnsdist.metrics
          tags:
            - tag: component
              value: security
        - uuid: 17d9f8b8735f44ea813a887064357288
          name: 'Cache Hits'
          type: DEPENDENT
          key: pdns.dnsdist.cache.hits
          value_type: FLOAT
          description: 'Number of times an answer was retrieved from cache.'
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - dnsdist_cache_hits
                - value
                - ''
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: SIMPLE_CHANGE
          master_item:
            key: pdns.dnsdist.metrics
          tags:
            - tag: component
              value: cache
        - uuid: 790057ace074415fa58143ce485bbc0d
          name: 'Cache Misses'
          type: DEPENDENT
          key: pdns.dnsdist.cache.misses
          value_type: FLOAT
          description: 'Number of times an answer was not found in the cache.'
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - dnsdist_cache_misses
                - value
                - ''
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: SIMPLE_CHANGE
          master_item:
            key: pdns.dnsdist.metrics
          tags:
            - tag: component
              value: cache
        - uuid: 81959dea1d2b452a838ed9e283722eb0
          name: 'CPU I/O Wait'
          type: DEPENDENT
          key: pdns.dnsdist.cpu.iowait
          value_type: FLOAT
          description: 'Time spent waiting for I/O to complete by the whole system, in units of USER_HZ.'
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - dnsdist_cpu_iowait
                - value
                - ''
              error_handler: CUSTOM_VALUE
