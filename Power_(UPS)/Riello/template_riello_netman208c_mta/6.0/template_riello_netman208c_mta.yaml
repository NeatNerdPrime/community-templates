zabbix_export:
  version: '6.0'
  date: '2026-04-23T23:01:25Z'
  groups:
    - uuid: 9cd0dddb7d144ac7bfe52afd4f95f6ab
      name: Infrastructure/Power
  templates:
    - uuid: f5ce567f2bac449c98750b2f41d9e0ba
      template: 'SNMP Riello Netman208c MTA 16A'
      name: 'SNMP Riello Netman208c MTA 16A'
      description: |
        ## Overview
        
        Template for Riello MTS / MTA 16A Automatic Transfer Switch (ATS) monitored via
        SNMP using the RIELLOMTS-MIB (rielloMIB.mtsMIB = .1.3.6.1.4.1.5491.12).
        
        All OIDs are numeric to avoid any MIB dependency on the Zabbix server.
        
        Covers:
        * Full inventory (mtsIdent)
        * Electrical measurements: voltages S1/S2, frequencies S1/S2, output current, load %, phase difference
        * Device internal temperature
        * Active source tracking for Zabbix Maps (mtsOnSourceS1 / mtsOnSourceS2)
        * Transfer state: preferred source, transfer inhibit, non-synch inhibit, locked, sync bad
        * All source quality alarms: blackout, phase sequence, voltage tolerance, frequency, balance
        * All hardware fault alarms: SCR loss (S1/S2/output), input switches, MCCB trips, manual bypass
        * General alarms: temperature, overload, general failure
        
        Triggers cover DISASTER through INFO levels.
        
        
        ## Author
        Derived from Eaton ATS template (Original author Maurice Flier), 
        converted and extended for Riello MTS.
      groups:
        - name: Infrastructure/Power
      items:
        - uuid: 034bf57904cb47008df282c7905786f2
          name: 'MTS Overload Alarm'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.43.0
          key: mtsAlarmOverload
          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsAlarmOverload.0 - 1= yes (output is overloaded; current exceeds the nominal rating), 0= no. Check mtsLoadL1 (.12.2.10.0) and mtsOutputCurrentL1 (.12.2.13.0).'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 7b545a48b50d4646894c58e74ff83f5c
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsAlarmOverload)=1'
              name: '{HOST.NAME} - Overload Alarm Detected'
              opdata: 'Load: {ITEM.LASTVALUE2} %  Current: {ITEM.LASTVALUE3} A'
              priority: AVERAGE
              description: 'The output current has exceeded the nominal rating of the device. Reduce the load or investigate which connected equipment is drawing excessive current. Risk of thermal damage or automatic shutdown.'
        - uuid: c23df0e1b2b84f408000d8df96389e15
