  triggers:
    - uuid: 3274b59ade424ce9a230396cb2df0a98
      expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsS1Blackout)=1 and last(/SNMP Riello Netman208c MTA 16A/mtsS2Blackout)=1'
      name: '{HOST.NAME} - BOTH SOURCES IN BLACKOUT - Load Unprotected'
      priority: DISASTER
      description: 'Both S1 and S2 are simultaneously in complete blackout. The connected load has no power source available and is unprotected. Requires immediate response.'
    - uuid: feabc48577a8418ab2123fd1be553a0e
      expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsManBypassS1)=1 or last(/SNMP Riello Netman208c MTA 16A/mtsManBypassS2)=1'
      name: '{HOST.NAME} - Manual Bypass Active'
      priority: WARNING
      description: 'A manual bypass is active on S1 or S2. The device is in bypass mode: the load is directly connected to a source without ATS protection or switching capability. Typically used during maintenance. Ensure this is intentional.'
    - uuid: b086a2ae78cc4208adf605788c805009
      expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsManTransferS1)=1 or last(/SNMP Riello Netman208c MTA 16A/mtsManTransferS2)=1'
      name: '{HOST.NAME} - Manual Transfer In Progress'
      priority: INFO
      description: 'A manual transfer command is currently being executed. This is an operational event. The trigger will auto-clear when the transfer completes.'
    - uuid: 0d8fe059ca1c431cb597c2663d76261c
      expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsAlarmTemperature)=1 and last(/SNMP Riello Netman208c MTA 16A/mtsTemperature)<65535'
      name: '{HOST.NAME} - Temperature Alarm'
      opdata: 'Temp: {ITEM.LASTVALUE2} °C'
      priority: AVERAGE
      description: 'The device internal temperature has exceeded the alarm threshold. Check ambient temperature, ventilation, and load level. Prolonged overtemperature may cause automatic shutdown or component damage.'
      manual_close: 'YES'
    - uuid: 3dfeed91a35f4d518e65c9498cea69e3
      expression: |
        (last(/SNMP Riello Netman208c MTA 16A/mtsPreferredSource)=0 and last(/SNMP Riello Netman208c MTA 16A/mtsOnSourceS2)=1)
        or
        (last(/SNMP Riello Netman208c MTA 16A/mtsPreferredSource)=1 and last(/SNMP Riello Netman208c MTA 16A/mtsOnSourceS1)=1)
      name: '{HOST.NAME} - Using NOT preferred source'
      priority: WARNING
      description: |
        Source S1 is preferred but S2 is powering load, or
        Source S2 is preferred but S1 is powering load
