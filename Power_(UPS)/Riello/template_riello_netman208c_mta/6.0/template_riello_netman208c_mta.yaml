              value: Inventory
        - uuid: 4bd0c470ff1841fe8e145dca376b23a7
          name: 'MTS Output Load L1'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.10.0
          key: mtsLoadL1
          units: '%'
          description: 'RIELLOMTS-MIB::mtsLoadL1.0 - The output load of line 1 (%).'
          tags:
            - tag: Application
              value: Power
          triggers:
            - uuid: 6bb7bf330bf9406a967cc4787a1b6bd8
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsLoadL1)>80'
              name: '{HOST.NAME} - Output Load High (>{ITEM.LASTVALUE}%)'
              opdata: 'Load: {ITEM.LASTVALUE} %'
              priority: WARNING
              description: 'Output load on L1 exceeds 80% of nominal. At sustained high load, the risk of overload alarm or thermal trip increases. Consider reducing the load or redistributing it across circuits.'
        - uuid: fd9a56d3c62f4d5b9df6a45823b472a2
          name: 'MTS Locked'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.29.0
          key: mtsLocked
          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsLocked.0 - 1= locked (the device is locked on current source and cannot transfer), 0= not locked.'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 316676dd84844ea480e620c12789f5f6
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsLocked)=1'
              name: '{HOST.NAME} - MTS Locked (Transfer Disabled)'
              priority: HIGH
              description: 'The device is locked on the current source and automatic transfer is disabled. This means there is NO redundancy protection. The lock condition may be a configuration setting or the result of a fault. Check the device front panel.'
        - uuid: b6fc26c96b29409e8437e2ec0523e9b7
