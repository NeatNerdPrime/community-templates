          trends: '0'
          description: 'RIELLOMTS-MIB::mtsAlarmTemperature.0 - 1= yes (temperature alarm threshold exceeded), 0= no. Check mtsTemperature (.12.2.16.0) for the actual measured value.'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
        - uuid: 318e8825aa2146efa679720d65fb33ae
