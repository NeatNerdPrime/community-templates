          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsManBypassS1.0 - 1= yes (manual bypass on S1 is active, device is bypassed), 0= no.'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
        - uuid: 08077f10ad1f490eba93adcd85bbe6ac
          name: 'MTS Manual Bypass S2 Active'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.49.0
