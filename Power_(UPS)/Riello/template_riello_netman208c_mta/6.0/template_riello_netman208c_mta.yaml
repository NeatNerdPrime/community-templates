          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsManBypassS2.0 - 1= yes (manual bypass on S2 is active, device is bypassed), 0= no.'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
        - uuid: dc1bb2c608a146978bdd1a2ec6f5ea21
          name: 'MTS Manual Transfer to S1 Active'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.52.0
          key: mtsManTransferS1
          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsManTransferS1.0 - 1= yes (manual transfer to S1 is in progress), 0= no.'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
        - uuid: 2219e8f81e3644eb84f5e41e254da22f
          name: 'MTS Manual Transfer to S2 Active'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.51.0
          key: mtsManTransferS2
          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsManTransferS2.0 - 1= yes (manual transfer to S2 is in progress), 0= no.'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
        - uuid: 5da15d873f0544be95eb94719ef3c1ba
          name: 'MTS Non-Synch Transfer Inhibit'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.24.0
          key: mtsNonSynchInibit
          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsNonSynchInibit.0 - 1= yes (non-synchronous transfer is inhibited by configuration), 0= no.'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 60c4be8522eb49bd97d88a0e8d99cb21
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsNonSynchInibit)=1'
              name: '{HOST.NAME} - Non-Synchronous Transfer Inhibited'
              priority: WARNING
              description: 'Non-synchronous transfer is inhibited by configuration. If the sources are out of sync when a transfer is required, the MTS will wait rather than perform a non-synchronous switch. This may increase the load interruption time during a source fault.'
        - uuid: 7d4c3fa367b64c4192a7632333129272
          name: 'MTS On Source S1 (Powering Load)'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.28.0
          key: mtsOnSourceS1
          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsOnSourceS1.0 - 1= yes (S1 is actively powering the load), 0= no. Used for Zabbix Maps. OID .12.2.28.0'
          valuemap:
            name: 'Riello MTA InputStatus Used'
          tags:
            - tag: Application
              value: MapIndicators
          triggers:
            - uuid: b01df79c27234552832d57cd74623d9e
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsOnSourceS1)=0'
              name: '{HOST.NAME} - Source S1 NOT Powering Load (Standby)'
              priority: INFO
              description: 'Source S1 is not the active source; the load is being powered by S2. Used as a map indicator. This is normal when S2 is preferred or S1 is unavailable.'
        - uuid: d7feb953c43a47339c48d50b1425db80
          name: 'MTS On Source S2 (Powering Load)'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.27.0
          key: mtsOnSourceS2
          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsOnSourceS2.0 - 1= yes (S2 is actively powering the load), 0= no. Used for Zabbix Maps. OID .12.2.27.0'
          valuemap:
            name: 'Riello MTA InputStatus Used'
          tags:
            - tag: Application
              value: MapIndicators
          triggers:
            - uuid: 955f49b1852e47a1925b5abf0feddbd0
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsOnSourceS2)=0'
              name: '{HOST.NAME} - Source S2 NOT Powering Load (Standby)'
              priority: INFO
              description: 'Source S2 is not the active source; the load is being powered by S1. Used as a map indicator. This is normal when S1 is preferred.'
        - uuid: 1a94464816d94bb39f9f8d5eff2d2fbe
          name: 'MTS Output Current L1'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.13.0
          key: mtsOutputCurrentL1
          value_type: FLOAT
          units: A
          description: 'RIELLOMTS-MIB::mtsOutputCurrentL1.0 - The output load current of line 1 (0.1 A). Multiplied by 0.1 in preprocessing.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
          tags:
            - tag: Application
              value: Power
        - uuid: 4185329ad8aa4ef9aa6423a80b50ab42
          name: 'MTS Output SCR Alternance Loss'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.48.0
          key: mtsOutputSCRalternanceloss
          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsOutputSCRalternanceloss.0 - 1= yes (SCR alternance loss on output stage; the output switching SCRs have failed), 0= no. Critical hardware fault: no clean transfer possible.'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: eaa40978f680402bbf8af6daf95df673
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsOutputSCRalternanceloss)=1'
              name: '{HOST.NAME} - Output SCR Alternance Loss (Critical Hardware Fault)'
              priority: DISASTER
              description: 'The output-stage SCR switching circuit has failed. The device cannot perform clean transfers. The load may be at risk. Requires immediate hardware intervention.'
        - uuid: e9e338c1a0a54d0fb807538382f9e92d
          name: 'MTS Output Switch Off'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.30.0
          key: mtsOutputSwitchOff
          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsOutputSwitchOff.0 - 1= yes (output switch is open, no power to load), 0= no.'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: d550c6ec17834977964f28a59bd84943
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsOutputSwitchOff)=1'
              name: '{HOST.NAME} - Output Switch is OFF (No Power to Load)'
              priority: HIGH
              description: 'The output switch is open. The connected load is receiving no power regardless of source availability. Check whether this is intentional or the result of a fault or manual operation.'
        - uuid: fad31ae754764244afe1c27e8bbddee5
          name: 'MTS Phase Difference S1-S2'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.9.0
          key: mtsPhaseDifference
          units: °
          description: 'RIELLOMTS-MIB::mtsPhaseDifference.0 - Phase difference between sources (degrees). High values indicate the two sources are out of phase; a forced transfer may cause a load disturbance.'
          tags:
            - tag: Application
              value: Power
          triggers:
            - uuid: 0ee37c229d864c708e9f7c1f42b8dc1e
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsPhaseDifference)>30'
              name: '{HOST.NAME} - Phase Difference High Between Sources'
              opdata: 'Phase diff: {ITEM.LASTVALUE} °'
              priority: WARNING
              description: 'Phase difference between S1 and S2 exceeds 30°. A forced transfer while sources are significantly out of phase will cause a momentary disturbance or brief interruption to the load. Adjust the threshold to match your site tolerance. This trigger fires on the last measured value; set manual_close so it can be acknowledged after transient events.'
              manual_close: 'YES'
        - uuid: c774cd48cfcd4f7b859c7fb61953ace8
          name: 'MTS Preferred Source'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.22.0
          key: mtsPreferredSource
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsPreferredSource.0 - The preferred source: 1= S2, 0= S1.'
          valuemap:
            name: 'Riello MTS Source Select'
          tags:
            - tag: Application
              value: Status
        - uuid: 1a2ac2a630414bb3a41eed53f5573bbd
          name: 'MTS S1 Phase Balance Bad'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5491.12.2.37.0
          key: mtsS1Balancebad
          delay: 30s
          history: 30d
          trends: '0'
          description: 'RIELLOMTS-MIB::mtsS1Balancebad.0 - 1= yes (phase balance on S1 is outside acceptable limits; applies to 3-phase configurations), 0= no.'
          valuemap:
            name: 'Riello MTS Yes/No'
          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 1132d3d032a24ff6a4e5a0b67b016405
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsS1Balancebad)=1'
              name: '{HOST.NAME} - Source S1 Phase Balance Fault'
