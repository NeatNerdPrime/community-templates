          triggers:
            - uuid: cb87951a97494c78b35906dd20598a88
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsAuxPower1fail)=1'
              name: '{HOST.NAME} - Auxiliary Power Supply 1 Failure'
              priority: HIGH
              description: 'Auxiliary power supply 1 of the MTS has failed. This powers the internal control circuitry. If both auxiliary supplies fail, the MTS may lose the ability to perform transfers.'
