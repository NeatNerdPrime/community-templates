          tags:
            - tag: Application
              value: Status
          triggers:
            - uuid: 980c8787ea824e3d803950cba39835f1
              expression: 'last(/SNMP Riello Netman208c MTA 16A/mtsGeneralFailure)=1'
              name: '{HOST.NAME} - General Failure Detected'
              priority: DISASTER
              description: 'The device has asserted a general failure condition. Check each individual alarm item (SCR loss, MCCB trip, aux power, etc.) to identify the root cause. Immediate attention required.'
