        - uuid: 345e7916bc354d019779685f030ebb69
          name: 'Nimble: Get data'
          type: SCRIPT
          key: nimble.get.data
          history: '0'
          value_type: TEXT
          trends: '0'
          params: |
            
            var Nimble = {
                params: {},
                token: null,
                errors: [],
            
                setParams: function (params) {
                    ['username', 'password', 'base_url'].forEach(function (field) {
                        if (typeof params !== 'object' || typeof params[field] === 'undefined' || params[field] === '') {
                            throw 'Required param is not set: ' + field + '.';
                        }
                    });
                    Nimble.params = params;
                },
            
                login: function () {
                    var request = new HttpRequest();
                    request.addHeader('Content-Type: application/json');
                    request.addHeader('Accept: application/json');
            
                    var response = request.post(
                        Nimble.params.base_url + '/v1/tokens',
                        JSON.stringify({ data: { username: Nimble.params.username, password: Nimble.params.password } })
                    );
            
                    if (request.getStatus() !== 201 && request.getStatus() !== 200) {
                        throw 'Auth failed (HTTP ' + request.getStatus() + '): ' + response;
                    }
            
                    try {
                        var result = JSON.parse(response);
                        if (result.data && result.data.session_token) {
                            Nimble.token = result.data.session_token;
                        } else if (result.data && result.data.id) {
                            Nimble.token = result.data.id;
                        } else {
                            throw 'No token in auth response';
                        }
                    } catch (e) {
                        throw 'Auth parse error: ' + e;
                    }
                },
            
                request: function (path) {
                    if (!Nimble.token) throw 'No auth token.';
                    var request = new HttpRequest();
                    request.addHeader('X-Auth-Token: ' + Nimble.token);
                    request.addHeader('Accept: application/json');
            
                    var response = request.get(Nimble.params.base_url + '/v1/' + path);
            
                    if (request.getStatus() !== 200) {
                        throw 'HTTP ' + request.getStatus() + ' on ' + path;
                    }
            
                    try {
                        return JSON.parse(response).data || [];
                    } catch (e) {
                        throw 'Parse error (' + path + '): ' + e;
                    }
                },
            
                requestDetail: function (collection) {
                    var items = Nimble.request(collection);
                    if (!items || !items.length) return [];
                    var detailed = [];
                    for (var i = 0; i < items.length; i++) {
                        try {
                            var item = Nimble.request(collection + '/' + items[i].id);
                            detailed.push(item);
                        } catch (e) {
                            items[i]._error = e.toString();
                            detailed.push(items[i]);
                        }
                    }
                    return detailed;
                },
            
                logout: function () {
                    if (Nimble.token) {
                        try {
                            var request = new HttpRequest();
                            request.addHeader('X-Auth-Token: ' + Nimble.token);
                            request.delete(Nimble.params.base_url + '/v1/tokens/' + Nimble.token);
                        } catch (e) {}
                    }
                }
            };
            
            var data = { arrays: [], controllers: [], pools: [], volumes: [], disks: [], network_interfaces: [], shelves: [], alarms: [], errors: "" };
            
            try {
                Nimble.setParams(JSON.parse(value));
                Nimble.login();
            
                var detailEndpoints = ['arrays', 'controllers', 'pools', 'shelves'];
                for (var i = 0; i < detailEndpoints.length; i++) {
                    try {
                        data[detailEndpoints[i]] = Nimble.requestDetail(detailEndpoints[i]);
                    } catch (err) {
                        Nimble.errors.push(detailEndpoints[i] + ': ' + err);
                    }
                }
            
                var listEndpoints = ['volumes', 'disks', 'network_interfaces', 'alarms'];
                for (var j = 0; j < listEndpoints.length; j++) {
                    try {
                        data[listEndpoints[j]] = Nimble.requestDetail(listEndpoints[j]);
                    } catch (err) {
                        Nimble.errors.push(listEndpoints[j] + ': ' + err);
                    }
                }
            
                data.errors = Nimble.errors.join(' | ');
            } catch (e) {
                data.errors = "CRITICAL: " + e.toString();
            } finally {
                Nimble.logout();
            }
            
            return JSON.stringify(data);
          timeout: '{$HPE.NIMBLE.DATA.TIMEOUT}'
          parameters:
            - name: base_url
              value: '{$HPE.NIMBLE.API.SCHEME}://{$HPE.NIMBLE.API.HOST}:{$HPE.NIMBLE.API.PORT}'
            - name: password
              value: '{$HPE.NIMBLE.API.PASSWORD}'
            - name: username
              value: '{$HPE.NIMBLE.API.USERNAME}'
          tags:
            - tag: component
              value: raw
        - uuid: f65e6bd877fe4e9e910ca2fd392fcf46
