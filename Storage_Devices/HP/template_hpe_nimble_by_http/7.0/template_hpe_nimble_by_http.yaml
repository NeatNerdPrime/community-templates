zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 8e89fd6d44134635b89f423c8bf1bbba
      name: Templates/SAN
  templates:
    - uuid: 7737e58ea09e491b93ba737f3cfa94a6
      template: 'HPE Nimble Storage by HTTP'
      name: 'HPE Nimble Storage by HTTP'
      description: |
        HPE Nimble Storage (Nimble OS 5.x / Alletra 6000) monitoring via REST API.
        Uses a single SCRIPT item to authenticate, query all endpoints, and return JSON.
        All metrics are extracted as DEPENDENT items.
        
        Endpoints: arrays, controllers, pools, volumes, disks, network_interfaces, shelves, alarms.
        
        Setup:
        1. Link template to host.
        2. Set {$HPE.NIMBLE.API.HOST}, {$HPE.NIMBLE.API.USERNAME}, {$HPE.NIMBLE.API.PASSWORD}.
        3. Default port: 5392, scheme: https.
      groups:
        - name: Templates/SAN
      items:
        - uuid: 95b8ad7687fa47c4bbfc4903084f864c
          name: 'Array: Model'
          type: DEPENDENT
          key: nimble.array.model
          delay: '0'
          history: 7d
          value_type: CHAR
          trends: '0'
          inventory_link: MODEL
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.arrays[0].model'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          master_item:
            key: nimble.get.data
          tags:
            - tag: component
              value: system
        - uuid: 3efb80d5a57647d882a8015e69b593fe
          name: 'Array: Name'
          type: DEPENDENT
          key: nimble.array.name
          delay: '0'
          history: 7d
