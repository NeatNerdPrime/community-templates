          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.[?(@.stat_name=="vdisk_w_io")].stat_current.first()'
          master_item:
            key: ibm.api.lssystemstats
          tags:
            - tag: component
              value: performance

        - uuid: bddf57a413c243018b33bdeaec9a7c8b
          name: 'Performance: Volume total IOPS'
          type: DEPENDENT
          key: ibm.system.vdisk_io
          delay: '0'
          history: 7d
          trends: 365d
