            - uuid: 0911bf11416b46aeb84cf3c73357b61e
              name: 'Drive [{#DRIVE.ID}]: Capacity'
              type: DEPENDENT
              key: 'ibm.drive.capacity[{#DRIVE.ID}]'
              delay: '0'
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: B
              description: 'Capacity of drive {#DRIVE.ID}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.capacity
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var m = value.match(/^([\d.]+)\s*(TB|GB|MB|PB)/i);
                      if (!m) return 0;
                      var n = parseFloat(m[1]);
                      var u = m[2].toUpperCase();
                      var mul = {'MB':1048576,'GB':1073741824,'TB':1099511627776,'PB':1125899906842624};
                      return Math.round(n * (mul[u] || 1));
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              master_item:
                key: 'ibm.drive.get[{#DRIVE.ID}]'
              tags:
                - tag: component
                  value: storage
