zabbix_export:
  version: '6.4'
  template_groups:
    - uuid: 626f260a51cd47d19dc5ea5e2082cf44
      name: Templates/Storage Devices
  templates:
    - uuid: 0f5529c0d295402ea2634219bf3ee1b1
      template: 'IBM FlashSystem 5300 by REST API and SNMP'
      name: 'IBM FlashSystem 5300 by REST API and SNMP'
      description: |
        Template for monitoring IBM Storage FlashSystem 5300 (Spectrum Virtualize).
        Uses REST API (HTTP Agent) for performance, capacity and hardware monitoring.
        Uses SNMP traps for event notifications (IBM-SVC-MIB).

        Requirements:
        - REST API access on port 7443 (HTTPS)
        - REST API user with Monitor or Administrator role
        - SNMP trap receiver configured on Zabbix server (snmptrapd)
        - SNMP trap sender configured on FlashSystem (mksnmpserver)

        Tested on: IBM FlashSystem 5300, Spectrum Virtualize 8.6.x / 8.7.x
      groups:
        - name: Templates/Storage Devices
      # ──────────────────────────────────────────────
      #  MACROS
      # ──────────────────────────────────────────────
      macros:
        - macro: '{$IBM.API.URL}'
          value: 'https://{HOST.CONN}:7443/rest/v1'
          description: 'Base URL for FlashSystem REST API.'
        - macro: '{$IBM.API.USER}'
          value: 'monitor'
          description: 'REST API username.'
        - macro: '{$IBM.API.PASSWORD}'
          type: SECRET_TEXT
          description: 'REST API password.'
        - macro: '{$IBM.HTTP.PROXY}'
          description: 'HTTP proxy for API requests (leave empty for direct connection).'
        - macro: '{$IBM.API.INTERVAL}'
          value: 5m
          description: 'Default polling interval for REST API items.'
        - macro: '{$IBM.API.INTERVAL.PERF}'
          value: 1m
          description: 'Polling interval for performance metrics.'
        - macro: '{$IBM.API.INTERVAL.DISCOVERY}'
          value: 1h
          description: 'Polling interval for discovery rules.'
        - macro: '{$IBM.API.TIMEOUT}'
          value: 15s
          description: 'HTTP request timeout.'
        - macro: '{$IBM.POOL.UTIL.WARN}'
          value: '80'
          description: 'Warning threshold for pool utilization (%).'
        - macro: '{$IBM.POOL.UTIL.CRIT}'
          value: '90'
          description: 'Critical threshold for pool utilization (%).'
        - macro: '{$IBM.CPU.UTIL.WARN}'
          value: '80'
          description: 'Warning threshold for CPU utilization (%).'
        - macro: '{$IBM.CPU.UTIL.CRIT}'
          value: '90'
          description: 'Critical threshold for CPU utilization (%).'
        - macro: '{$IBM.CACHE.UTIL.WARN}'
          value: '80'
          description: 'Warning threshold for write cache utilization (%).'
        - macro: '{$IBM.TEMP.WARN}'
          value: '35'
          description: 'Warning threshold for temperature (Celsius).'
        - macro: '{$IBM.TEMP.CRIT}'
          value: '40'
          description: 'Critical threshold for temperature (Celsius).'
        - macro: '{$IBM.DRIVE.NAME.MATCHES}'
          value: '.*'
          description: 'Filter to include drives in discovery.'
        - macro: '{$IBM.DRIVE.NAME.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Filter to exclude drives from discovery.'
        - macro: '{$IBM.POOL.NAME.MATCHES}'
          value: '.*'
          description: 'Filter to include storage pools in discovery.'
        - macro: '{$IBM.POOL.NAME.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Filter to exclude storage pools from discovery.'
        - macro: '{$IBM.VOLUME.NAME.MATCHES}'
          value: '.*'
          description: 'Filter to include volumes in discovery.'
        - macro: '{$IBM.VOLUME.NAME.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Filter to exclude volumes from discovery.'
        - macro: '{$SNMP_COMMUNITY}'
          value: public
          description: 'SNMP community string for traps.'
        - macro: '{$IBM.VDISK.LATENCY.WARN}'
          value: '20'
          description: 'Warning threshold for volume latency (ms).'
        - macro: '{$IBM.VDISK.LATENCY.CRIT}'
          value: '50'
          description: 'Critical threshold for volume latency (ms).'
      # ──────────────────────────────────────────────
      #  ITEMS - System Information (lssystem)
      # ──────────────────────────────────────────────
      items:
        # ── ICMP ──
        - uuid: 3e7e445223f345eca0bb905b78040996
          name: 'ICMP: Ping'
          type: SIMPLE
          key: icmpping
          delay: 1m
          history: 7d
          value_type: UNSIGNED
          description: 'Host availability check via ICMP ping.'
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
          triggers:
            - uuid: ebdc4132484f48eaa660de6e9f2f11b9
              expression: 'max(/IBM FlashSystem 5300 by REST API and SNMP/icmpping,#3)=0'
              name: 'IBM FlashSystem: Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last three ICMP ping attempts failed.'
              tags:
                - tag: scope
                  value: availability

        - uuid: e9a02bc8d4a2468a8e24ef7e52f38dc0
          name: 'ICMP: Loss'
          type: SIMPLE
          key: icmppingloss
          delay: 1m
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: '%'
          description: 'ICMP packet loss percentage.'
          tags:
            - tag: component
              value: health

        - uuid: 0fdda19c256140a19a53ad6e6ded749a
          name: 'ICMP: Response time'
          type: SIMPLE
          key: icmppingsec
          delay: 1m
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: s
          description: 'ICMP ping response time.'
          tags:
            - tag: component
              value: health

        # ── REST API: lssystem (master item) ──
        - uuid: fe6ca9794d864792a980bff73b312b0a
          name: 'API: Get system info'
          type: SCRIPT
          key: ibm.api.lssystem
          delay: '{$IBM.API.INTERVAL}'
          history: '0'
          trends: '0'
          value_type: TEXT
          description: 'Retrieves system information via lssystem REST API call.'
          timeout: '{$IBM.API.TIMEOUT}'
          params: |
            var req = new HttpRequest();
            req.addHeader('Content-Type: application/json');
            req.addHeader('X-Auth-Username: {$IBM.API.USER}');
            req.addHeader('X-Auth-Password: {$IBM.API.PASSWORD}');
            var authResp = req.post('{$IBM.API.URL}/auth');
            var token = JSON.parse(authResp).token;
            req.clearHeader();
            req.addHeader('Content-Type: application/json');
            req.addHeader('X-Auth-Token: ' + token);
            return req.post('{$IBM.API.URL}/lssystem');
          tags:
            - tag: component
              value: raw

        # ── Dependent items from lssystem ──
        - uuid: 5539221509dd44de84c0988758b5d16e
          name: 'System: Name'
          type: DEPENDENT
          key: ibm.system.name
          delay: '0'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'FlashSystem cluster name.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.name
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: system

        - uuid: b994cca0fa6744d4acdd75839877a5c2
          name: 'System: Location'
          type: DEPENDENT
          key: ibm.system.location
          delay: '0'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'Physical location of the system.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.location
              error_handler: CUSTOM_VALUE
              error_handler_params: ''
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: system

        - uuid: 36a40abe964843ed9e3548cb9c2a3d1a
          name: 'System: Code level'
          type: DEPENDENT
          key: ibm.system.code_level
          delay: '0'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'Firmware/software code level.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.code_level
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 0f9be78618264d89ab72e0a4e6ba3f6d
              expression: 'change(/IBM FlashSystem 5300 by REST API and SNMP/ibm.system.code_level)=1 and length(last(/IBM FlashSystem 5300 by REST API and SNMP/ibm.system.code_level))>0'
              name: 'IBM FlashSystem: Firmware version changed'
              priority: INFO
              description: 'System firmware version has changed.'
              tags:
                - tag: scope
                  value: notice

        - uuid: be85db6907d34a82ac853d1272621231
          name: 'System: Product name'
          type: DEPENDENT
          key: ibm.system.product_name
          delay: '0'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'Product name (e.g. IBM FlashSystem 5300).'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.product_name
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: system

        - uuid: 83bbf79b2a554acab938b277375895a2
          name: 'System: Machine type-model'
          type: DEPENDENT
          key: ibm.system.machine_type_model
          delay: '0'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'Machine type and model (e.g. 4662-7H2).'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["machine_type-model"]'
              error_handler: CUSTOM_VALUE
              error_handler_params: ''
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: system

        - uuid: af6c3034d888414f9b7ccf2fb9cebb8a
          name: 'System: Serial number'
          type: DEPENDENT
          key: ibm.system.serial_number
          delay: '0'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'System serial number.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.id
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: system

        - uuid: 8178186e11bc4d3d988463b5e9e82c0c
          name: 'System: Total MDisk capacity'
          type: DEPENDENT
          key: ibm.system.total_mdisk_capacity
          delay: '0'
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: B
          description: 'Total managed disk capacity in the system.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.total_mdisk_capacity
            - type: JAVASCRIPT
              parameters:
                - |
                  // Convert value like "10.5TB" to bytes
                  var m = value.match(/^([\d.]+)\s*(TB|GB|MB|PB)/i);
                  if (!m) return 0;
                  var n = parseFloat(m[1]);
                  var u = m[2].toUpperCase();
                  var mul = {'MB':1048576,'GB':1073741824,'TB':1099511627776,'PB':1125899906842624};
                  return Math.round(n * (mul[u] || 1));
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: capacity

        - uuid: 7d7561e0b8834d21824da7077b4e5d9b
          name: 'System: Total used capacity'
          type: DEPENDENT
          key: ibm.system.total_used_capacity
          delay: '0'
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: B
          description: 'Total used capacity in the system.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.space_allocated_to_vdisks
            - type: JAVASCRIPT
              parameters:
                - |
                  var m = value.match(/^([\d.]+)\s*(TB|GB|MB|PB)/i);
                  if (!m) return 0;
                  var n = parseFloat(m[1]);
                  var u = m[2].toUpperCase();
                  var mul = {'MB':1048576,'GB':1073741824,'TB':1099511627776,'PB':1125899906842624};
                  return Math.round(n * (mul[u] || 1));
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: capacity

        - uuid: e42c4aa5ef5b427882ecc1ab3f93bb23
          name: 'System: Total free capacity'
          type: DEPENDENT
          key: ibm.system.total_free_capacity
          delay: '0'
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: B
          description: 'Total free space on managed disks.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.total_free_space
            - type: JAVASCRIPT
              parameters:
                - |
                  var m = value.match(/^([\d.]+)\s*(TB|GB|MB|PB)/i);
                  if (!m) return 0;
                  var n = parseFloat(m[1]);
                  var u = m[2].toUpperCase();
                  var mul = {'MB':1048576,'GB':1073741824,'TB':1099511627776,'PB':1125899906842624};
                  return Math.round(n * (mul[u] || 1));
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: capacity

        - uuid: bd0484fd1c3048a882a22df06cd7627a
          name: 'System: Overall status'
          type: DEPENDENT
          key: ibm.system.statistics_status
          delay: '0'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'Indicates whether the system statistics collection is active.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.statistics_status
              error_handler: CUSTOM_VALUE
              error_handler_params: unknown
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: system

        - uuid: 7b13483d123e4f38babfd97235144cce
          name: 'System: Compression savings'
          type: DEPENDENT
          key: ibm.system.compression_cpu_pc
          delay: '0'
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'Compression active state.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.compression_active
              error_handler: CUSTOM_VALUE
              error_handler_params: 'no'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: system

        - uuid: 5357d908bc4d49d1b01c68104f759d4d
          name: 'System: Total nodes'
          type: DEPENDENT
          key: ibm.system.total_nodes
          delay: '0'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Total number of configured node canisters.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.total_nodes_configured
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: ibm.api.lssystem
          tags:
            - tag: component
              value: system

        # ── REST API: lssystemstats (master item) ──
        - uuid: 6078c7b226014a809be6909599b0b3f7
          name: 'API: Get system statistics'
          type: SCRIPT
          key: ibm.api.lssystemstats
          delay: '{$IBM.API.INTERVAL.PERF}'
          history: '0'
          trends: '0'
          value_type: TEXT
          description: 'Retrieves system performance statistics via lssystemstats REST API call.'
          timeout: '{$IBM.API.TIMEOUT}'
          params: |
            var req = new HttpRequest();
            req.addHeader('Content-Type: application/json');
            req.addHeader('X-Auth-Username: {$IBM.API.USER}');
            req.addHeader('X-Auth-Password: {$IBM.API.PASSWORD}');
            var authResp = req.post('{$IBM.API.URL}/auth');
            var token = JSON.parse(authResp).token;
            req.clearHeader();
            req.addHeader('Content-Type: application/json');
            req.addHeader('X-Auth-Token: ' + token);
            return req.post('{$IBM.API.URL}/lssystemstats');
          tags:
            - tag: component
              value: raw

        # ── Dependent items from lssystemstats ──
        - uuid: 1536974a45de402b83e1522d48196254
          name: 'Performance: CPU utilization'
          type: DEPENDENT
          key: ibm.system.cpu_pc
          delay: '0'
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: '%'
          description: 'Total CPU utilization across all nodes.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.[?(@.stat_name=="cpu_pc")].stat_current.first()'
          master_item:
            key: ibm.api.lssystemstats
          tags:
            - tag: component
              value: cpu
          triggers:
            - uuid: 1281e056421147749d014aea9f8b9397
              expression: 'min(/IBM FlashSystem 5300 by REST API and SNMP/ibm.system.cpu_pc,5m)>{$IBM.CPU.UTIL.CRIT}'
              name: 'IBM FlashSystem: CPU utilization critical (>{$IBM.CPU.UTIL.CRIT}%)'
              priority: HIGH
              description: 'CPU utilization has exceeded {$IBM.CPU.UTIL.CRIT}% for 5 minutes.'
              tags:
                - tag: scope
                  value: performance
            - uuid: bab619ec0815457986b366c3744772c7
              expression: 'min(/IBM FlashSystem 5300 by REST API and SNMP/ibm.system.cpu_pc,5m)>{$IBM.CPU.UTIL.WARN}'
              name: 'IBM FlashSystem: CPU utilization warning (>{$IBM.CPU.UTIL.WARN}%)'
              priority: WARNING
              description: 'CPU utilization has exceeded {$IBM.CPU.UTIL.WARN}% for 5 minutes.'
              dependencies:
                - name: 'IBM FlashSystem: CPU utilization critical (>{$IBM.CPU.UTIL.CRIT}%)'
                  expression: 'min(/IBM FlashSystem 5300 by REST API and SNMP/ibm.system.cpu_pc,5m)>{$IBM.CPU.UTIL.CRIT}'
              tags:
                - tag: scope
                  value: performance

        - uuid: 24922a688ddb44f5a545ebfdc9127db5
          name: 'Performance: Write cache utilization'
          type: DEPENDENT
          key: ibm.system.write_cache_pc
          delay: '0'
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: '%'
          description: 'Write cache utilization percentage.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.[?(@.stat_name=="write_cache_pc")].stat_current.first()'
          master_item:
            key: ibm.api.lssystemstats
          tags:
            - tag: component
              value: cache
          triggers:
            - uuid: dbc9ac32d62b43309668d1d9e3a8fc07
              expression: 'min(/IBM FlashSystem 5300 by REST API and SNMP/ibm.system.write_cache_pc,5m)>{$IBM.CACHE.UTIL.WARN}'
              name: 'IBM FlashSystem: Write cache utilization high (>{$IBM.CACHE.UTIL.WARN}%)'
              priority: WARNING
              description: 'Write cache utilization exceeded {$IBM.CACHE.UTIL.WARN}% for 5 minutes.'
              tags:
                - tag: scope
                  value: performance

        - uuid: 7c4fdc89b07c4f4695391be2cdf41d7e
          name: 'Performance: Total cache utilization'
          type: DEPENDENT
          key: ibm.system.total_cache_pc
          delay: '0'
          history: 7d
          trends: 365d
          value_type: FLOAT
