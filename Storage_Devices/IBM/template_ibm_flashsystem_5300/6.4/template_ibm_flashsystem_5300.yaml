              master_item:
                key: 'ibm.volume.get[{#VOL.ID}]'
              tags:
                - tag: component
                  value: storage
                - tag: volume
                  value: '{#VOL.NAME}'

            - uuid: 3890d563cbd942ebbb05c46a434f1ef3
              name: 'Volume [{#VOL.NAME}]: Capacity'
              type: DEPENDENT
              key: 'ibm.volume.capacity[{#VOL.ID}]'
              delay: '0'
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: B
              description: 'Virtual capacity of volume {#VOL.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.capacity
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var m = value.match(/^([\d.]+)\s*(TB|GB|MB|PB)/i);
                      if (!m) return 0;
                      var n = parseFloat(m[1]);
                      var u = m[2].toUpperCase();
                      var mul = {'MB':1048576,'GB':1073741824,'TB':1099511627776,'PB':1125899906842624};
                      return Math.round(n * (mul[u] || 1));
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              master_item:
                key: 'ibm.volume.get[{#VOL.ID}]'
              tags:
                - tag: component
                  value: capacity
                - tag: volume
                  value: '{#VOL.NAME}'

            - uuid: d1e0ea4290a9448ea3026bd1c1fc255e
              name: 'Volume [{#VOL.NAME}]: Used capacity'
              type: DEPENDENT
              key: 'ibm.volume.used_capacity[{#VOL.ID}]'
              delay: '0'
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: B
              description: 'Used (written) capacity of volume {#VOL.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.used_capacity
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var m = value.match(/^([\d.]+)\s*(TB|GB|MB|PB)/i);
                      if (!m) return 0;
                      var n = parseFloat(m[1]);
                      var u = m[2].toUpperCase();
                      var mul = {'MB':1048576,'GB':1073741824,'TB':1099511627776,'PB':1125899906842624};
                      return Math.round(n * (mul[u] || 1));
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'ibm.volume.get[{#VOL.ID}]'
              tags:
                - tag: component
                  value: capacity
                - tag: volume
                  value: '{#VOL.NAME}'

            - uuid: 8646548b419040b8bf48459e07d840f1
