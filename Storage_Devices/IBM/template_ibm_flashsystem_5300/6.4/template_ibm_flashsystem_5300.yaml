        - uuid: cf450519f6c2412aa6ec2ad34f8ff4d0
          name: 'Performance: Volume read throughput'
          type: DEPENDENT
          key: ibm.system.vdisk_r_mb
          delay: '0'
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: Bps
          description: 'Total volume read throughput.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.[?(@.stat_name=="vdisk_r_mb")].stat_current.first()'
            - type: MULTIPLIER
              parameters:
                - '1048576'
          master_item:
            key: ibm.api.lssystemstats
          tags:
            - tag: component
              value: performance

        - uuid: 6105412bcebd4429931e45bc4c1419d2
          name: 'Performance: Volume write throughput'
          type: DEPENDENT
          key: ibm.system.vdisk_w_mb
          delay: '0'
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: Bps
          description: 'Total volume write throughput.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.[?(@.stat_name=="vdisk_w_mb")].stat_current.first()'
            - type: MULTIPLIER
              parameters:
                - '1048576'
          master_item:
            key: ibm.api.lssystemstats
          tags:
            - tag: component
              value: performance

        - uuid: 1125b8e97f8c42578ee3f5d86cb34545
          name: 'Performance: Volume read latency'
          type: DEPENDENT
          key: ibm.system.vdisk_r_ms
          delay: '0'
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: ms
          description: 'Average volume read latency.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.[?(@.stat_name=="vdisk_r_ms")].stat_current.first()'
          master_item:
            key: ibm.api.lssystemstats
          tags:
            - tag: component
              value: performance

        - uuid: abe409d472d54d04be13a72019c8c335
