      # ──────────────────────────────────────────────
      #  DISCOVERY RULES
      # ──────────────────────────────────────────────
      discovery_rules:
        # ── Storage Pool Discovery ──
        - uuid: 1fccf5b71544451ebdee239bdc851973
          name: 'Storage pool discovery'
          type: SCRIPT
          key: ibm.api.lsmdiskgrp.discovery
          delay: '{$IBM.API.INTERVAL.DISCOVERY}'
          description: 'Discovers storage pools (managed disk groups) via REST API.'
          timeout: '{$IBM.API.TIMEOUT}'
          params: |
            var req = new HttpRequest();
            req.addHeader('Content-Type: application/json');
            req.addHeader('X-Auth-Username: {$IBM.API.USER}');
            req.addHeader('X-Auth-Password: {$IBM.API.PASSWORD}');
            var authResp = req.post('{$IBM.API.URL}/auth');
            var token = JSON.parse(authResp).token;
            req.clearHeader();
            req.addHeader('Content-Type: application/json');
            req.addHeader('X-Auth-Token: ' + token);
            return req.post('{$IBM.API.URL}/lsmdiskgrp');
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var result = [];
                  for (var i = 0; i < data.length; i++) {
                    result.push({
                      "{#POOL.ID}": data[i].id,
                      "{#POOL.NAME}": data[i].name,
                      "{#POOL.STATUS}": data[i].status
                    });
                  }
                  return JSON.stringify(result);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#POOL.NAME}'
                value: '{$IBM.POOL.NAME.MATCHES}'
                formulaid: A
              - macro: '{#POOL.NAME}'
                value: '{$IBM.POOL.NAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
          item_prototypes:
            - uuid: 188a7ea654f1428394e8042f99324249
              name: 'Pool [{#POOL.NAME}]: Get data'
              type: SCRIPT
              key: 'ibm.pool.get[{#POOL.ID}]'
              delay: '{$IBM.API.INTERVAL}'
              history: '0'
              trends: '0'
              value_type: TEXT
              description: 'Raw data for storage pool {#POOL.NAME}.'
              timeout: '{$IBM.API.TIMEOUT}'
              params: |
                var req = new HttpRequest();
                req.addHeader('Content-Type: application/json');
                req.addHeader('X-Auth-Username: {$IBM.API.USER}');
                req.addHeader('X-Auth-Password: {$IBM.API.PASSWORD}');
                var authResp = req.post('{$IBM.API.URL}/auth');
                var token = JSON.parse(authResp).token;
                req.clearHeader();
                req.addHeader('Content-Type: application/json');
                req.addHeader('X-Auth-Token: ' + token);
                return req.post('{$IBM.API.URL}/lsmdiskgrp/{#POOL.NAME}');
              tags:
                - tag: component
                  value: raw
                - tag: pool
                  value: '{#POOL.NAME}'

            - uuid: 2b58911612fb4619aa20b1db0fca2e0b
              name: 'Pool [{#POOL.NAME}]: Status'
              type: DEPENDENT
              key: 'ibm.pool.status[{#POOL.ID}]'
              delay: '0'
              history: 7d
              trends: '0'
              value_type: CHAR
              description: 'Status of storage pool {#POOL.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.status
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              master_item:
                key: 'ibm.pool.get[{#POOL.ID}]'
              tags:
                - tag: component
                  value: storage
                - tag: pool
                  value: '{#POOL.NAME}'

            - uuid: 65e216ec32774a3c9b317ce603555979
              name: 'Pool [{#POOL.NAME}]: Total capacity'
              type: DEPENDENT
              key: 'ibm.pool.capacity[{#POOL.ID}]'
              delay: '0'
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: B
              description: 'Total capacity of storage pool {#POOL.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.capacity
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var m = value.match(/^([\d.]+)\s*(TB|GB|MB|PB)/i);
                      if (!m) return 0;
                      var n = parseFloat(m[1]);
                      var u = m[2].toUpperCase();
                      var mul = {'MB':1048576,'GB':1073741824,'TB':1099511627776,'PB':1125899906842624};
                      return Math.round(n * (mul[u] || 1));
              master_item:
                key: 'ibm.pool.get[{#POOL.ID}]'
              tags:
                - tag: component
                  value: capacity
                - tag: pool
                  value: '{#POOL.NAME}'

            - uuid: 712d4669a2aa4a009d361902fea24d31
              name: 'Pool [{#POOL.NAME}]: Free capacity'
              type: DEPENDENT
              key: 'ibm.pool.free_capacity[{#POOL.ID}]'
              delay: '0'
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: B
              description: 'Free capacity of storage pool {#POOL.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.free_capacity
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var m = value.match(/^([\d.]+)\s*(TB|GB|MB|PB)/i);
                      if (!m) return 0;
                      var n = parseFloat(m[1]);
                      var u = m[2].toUpperCase();
                      var mul = {'MB':1048576,'GB':1073741824,'TB':1099511627776,'PB':1125899906842624};
                      return Math.round(n * (mul[u] || 1));
              master_item:
                key: 'ibm.pool.get[{#POOL.ID}]'
              tags:
                - tag: component
                  value: capacity
                - tag: pool
                  value: '{#POOL.NAME}'

            - uuid: ae4ef9008d8b4da8a66a97c53534b088
              name: 'Pool [{#POOL.NAME}]: Used capacity'
              type: DEPENDENT
              key: 'ibm.pool.used_capacity[{#POOL.ID}]'
              delay: '0'
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: B
              description: 'Used capacity of storage pool {#POOL.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.used_capacity
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var m = value.match(/^([\d.]+)\s*(TB|GB|MB|PB)/i);
                      if (!m) return 0;
                      var n = parseFloat(m[1]);
                      var u = m[2].toUpperCase();
                      var mul = {'MB':1048576,'GB':1073741824,'TB':1099511627776,'PB':1125899906842624};
                      return Math.round(n * (mul[u] || 1));
              master_item:
                key: 'ibm.pool.get[{#POOL.ID}]'
              tags:
                - tag: component
                  value: capacity
                - tag: pool
                  value: '{#POOL.NAME}'

            - uuid: e733cf4102c1458ea67bfab073a21807
              name: 'Pool [{#POOL.NAME}]: Utilization'
              type: CALCULATED
              key: 'ibm.pool.utilization[{#POOL.ID}]'
              delay: '{$IBM.API.INTERVAL}'
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: '%'
              description: 'Pool utilization percentage.'
              params: '100 * last(//ibm.pool.used_capacity[{#POOL.ID}]) / last(//ibm.pool.capacity[{#POOL.ID}])'
              tags:
                - tag: component
                  value: capacity
                - tag: pool
                  value: '{#POOL.NAME}'

            - uuid: a3b9e0f92a1f4f8086f3394d0fdf6750
              name: 'Pool [{#POOL.NAME}]: Overallocation'
              type: DEPENDENT
              key: 'ibm.pool.overallocation[{#POOL.ID}]'
              delay: '0'
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: '%'
              description: 'Ratio of virtual to physical capacity for pool {#POOL.NAME}.'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.overallocation
              master_item:
                key: 'ibm.pool.get[{#POOL.ID}]'
              tags:
                - tag: component
                  value: capacity
                - tag: pool
                  value: '{#POOL.NAME}'

          trigger_prototypes:
            - uuid: 38aef660a7094c948f59dcc496f0ea9b
              expression: 'last(/IBM FlashSystem 5300 by REST API and SNMP/ibm.pool.utilization[{#POOL.ID}])>{$IBM.POOL.UTIL.CRIT}'
              name: 'IBM FlashSystem: Pool [{#POOL.NAME}] utilization critical (>{$IBM.POOL.UTIL.CRIT}%)'
