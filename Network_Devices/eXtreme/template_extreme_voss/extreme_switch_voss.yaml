zabbix_export:
  version: '6.4'
  template_groups:
    - uuid: d1fda2cf45b5412e9c050cd2256e019f
      name: 'Templates/User Created'
  templates:
    - uuid: 36b09332e8a1482ca20153784742aac5
      template: 'Extreme Switch SNMP'
      name: 'Extreme Switch SNMP'
      groups:
        - name: 'Templates/User Created'
      items:
        - uuid: a55f58f5462e467d9090a67a148aeb4f
          name: 'CPU Utilization'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2272.1.85.10.1.1.2.1
          key: extreme.cpu.util
          delay: 3m
          history: 7d
          trends: 90d
          units: '%'
          triggers:
            - uuid: b275786f65a9454c8d7d04a10bb28e4f
              expression: 'avg(/Extreme Switch SNMP/extreme.cpu.util,5m)>{$CPU_HIGH}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'avg(/Extreme Switch SNMP/extreme.cpu.util,5m)<={$CPU_HIGH}-5'
              name: 'Critical CPU utilization on {HOST.NAME}'
              priority: HIGH
            - uuid: 6e18162dbf6a4f80bf31cb41898541f7
              expression: 'avg(/Extreme Switch SNMP/extreme.cpu.util,5m)>{$CPU_WARN}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'avg(/Extreme Switch SNMP/extreme.cpu.util,5m)<={$CPU_WARN}-5'
              name: 'High CPU utilization on {HOST.NAME}'
              priority: WARNING
        - uuid: fdb5cf547e394663a45e4f5c304d4473
          name: 'Memory Total'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2272.1.1.77.0
          key: extreme.mem.total
          delay: 5m
          history: 7d
          trends: 90d
          units: B
        - uuid: 76e749cb45094d63a17cf359985f5a1d
          name: 'Memory Used'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2272.1.1.78.0
          key: extreme.mem.used
          delay: 5m
          history: 7d
          trends: 90d
          units: B
        - uuid: e13cdec8b6c3475f81cd89dd8757b63f
          name: 'Memory Utilization'
          type: CALCULATED
          key: extreme.mem.util
          delay: 5m
          history: 7d
          trends: 90d
          units: '%'
          params: 'last(//extreme.mem.used)/last(//extreme.mem.total)*100'
          triggers:
            - uuid: 9f3a112bcc7d4e8fa91c3d5870b2e441
              expression: 'avg(/Extreme Switch SNMP/extreme.mem.util,10m)>{$MEM_HIGH}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'avg(/Extreme Switch SNMP/extreme.mem.util,10m)<={$MEM_HIGH}-5'
              name: 'Critical memory utilization on {HOST.NAME}'
              priority: HIGH
            - uuid: 3bce558adf854c66a04bee81229a27fa
              expression: 'avg(/Extreme Switch SNMP/extreme.mem.util,10m)>{$MEM_WARN}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'avg(/Extreme Switch SNMP/extreme.mem.util,10m)<={$MEM_WARN}-5'
              name: 'High memory utilization on {HOST.NAME}'
              priority: WARNING
        - uuid: 943b258f29ea4db2b8050373197d55f2
          name: 'System Description'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: system.descr
          delay: 1h
          history: 7d
          trends: '0'
          value_type: CHAR
        - uuid: 1d35aaa6d18e4b1c8c68dd0d64a3816d
          name: 'System Location'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.6.0
          key: system.location
          delay: 1h
          history: 7d
          trends: '0'
          value_type: CHAR
        - uuid: 65ee895c9d83492eb12fcdd3fb20c443
          name: 'System Name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.5.0
          key: system.name
          delay: 1h
          history: 7d
          trends: '0'
          value_type: CHAR
        - uuid: a0e84b68303b402785030986c55a7b74
          name: 'System Uptime'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: system.uptime
          delay: 5m
          history: 7d
          trends: 90d
          units: uptime
          triggers:
            - uuid: 62e1f63b7a484ec1be637d5dabd4fff5
              expression: 'last(/Extreme Switch SNMP/system.uptime)<600'
              name: 'Switch {HOST.NAME} has been restarted'
              priority: WARNING
              manual_close: 'YES'
      discovery_rules:
        - uuid: 454935f5f6fa4eb5990063303f774db1
          name: 'Network Interface Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFINDEX},.1.3.6.1.2.1.2.2.1.1,{#IFNAME},.1.3.6.1.2.1.2.2.1.2,{#IFALIAS},.1.3.6.1.2.1.31.1.1.1.18,{#IFTYPE},.1.3.6.1.2.1.2.2.1.3,{#IFSPEED},.1.3.6.1.2.1.31.1.1.1.15]'
          key: net.if.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFNAME}'
                value: '^((?!Mgmt).)*$'
                formulaid: A
              - macro: '{#IFTYPE}'
                value: ^6$
                formulaid: B
          item_prototypes:
            - uuid: 80a37b4f40074eff9282dfabf32c08b1
              name: 'Interface {#IFNAME} ({#IFALIAS}): In Discards'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.13.{#IFINDEX}'
              key: 'net.if.in.discards[{#IFNAME}]'
              delay: 5m
              history: 30d
              trends: 90d
              units: pps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
            - uuid: 6cadbfd7f54645cf96719220f87ae588
              name: 'Interface {#IFNAME} ({#IFALIAS}): In Errors'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.14.{#IFINDEX}'
              key: 'net.if.in.errors[{#IFNAME}]'
              delay: 5m
              history: 30d
              trends: 90d
              units: eps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
            - uuid: 3c4383756fe24cce932327769136fa37
              name: 'Interface {#IFNAME} ({#IFALIAS}): In Utilization'
              type: CALCULATED
              key: 'net.if.in.util[{#IFNAME}]'
              delay: 5m
              history: 30d
              trends: 90d
              units: '%'
              params: 'last(//net.if.in[{#IFNAME}])/(last(//net.if.speed[{#IFNAME}])*1000000)*100'
            - uuid: 509a149d80484b1e981b352f0aa3a045
              name: 'Interface {#IFNAME} ({#IFALIAS}): In Traffic'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.6.{#IFINDEX}'
              key: 'net.if.in[{#IFNAME}]'
              delay: 5m
              history: 30d
              trends: 90d
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
            - uuid: 65d0ea20e6b34128aaa93a238c474382
              name: 'Interface {#IFNAME} ({#IFALIAS}): Out Discards'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.19.{#IFINDEX}'
              key: 'net.if.out.discards[{#IFNAME}]'
              delay: 5m
              history: 30d
              trends: 90d
              units: pps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
            - uuid: 05b491f2b92a47e6b7ed44aa338702c7
              name: 'Interface {#IFNAME} ({#IFALIAS}): Out Errors'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.20.{#IFINDEX}'
              key: 'net.if.out.errors[{#IFNAME}]'
              delay: 5m
              history: 30d
              trends: 90d
              units: eps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
            - uuid: d3e1897ae48444ee8ad2ebc742f01abe
              name: 'Interface {#IFNAME} ({#IFALIAS}): Out Utilization'
              type: CALCULATED
              key: 'net.if.out.util[{#IFNAME}]'
              delay: 5m
              history: 30d
              trends: 90d
              units: '%'
              params: 'last(//net.if.out[{#IFNAME}])/(last(//net.if.speed[{#IFNAME}])*1000000)*100'
            - uuid: 91646253ef424e19b33a8dd24103ac3b
              name: 'Interface {#IFNAME} ({#IFALIAS}): Out Traffic'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.10.{#IFINDEX}'
              key: 'net.if.out[{#IFNAME}]'
              delay: 5m
              history: 30d
              trends: 90d
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
            - uuid: 9aec902203764232ba2129c788d4bc14
              name: 'Interface {#IFNAME} ({#IFALIAS}): Speed'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.15.{#IFINDEX}'
              key: 'net.if.speed[{#IFNAME}]'
              delay: 5m
              history: 7d
              trends: 90d
              units: Mbps
            - uuid: d7e235a618d748d4b694c22aa2780b3f
              name: 'Interface {#IFNAME} ({#IFALIAS}): Operational Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#IFINDEX}'
              key: 'net.if.status[{#IFNAME}]'
              history: 30d
              trends: '0'
              value_type: FLOAT
              valuemap:
                name: 'IF-MIB::ifOperStatus'
              trigger_prototypes:
                - uuid: c1511d298ddc4054bfe09b732c9c667b
                  expression: 'last(/Extreme Switch SNMP/net.if.status[{#IFNAME}])=2 and last(/Extreme Switch SNMP/net.if.status[{#IFNAME}],#1:now-10m)=1'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Extreme Switch SNMP/net.if.status[{#IFNAME}])=1'
                  name: 'Interface {#IFNAME} went DOWN on {HOST.NAME}'
                  priority: AVERAGE
          trigger_prototypes:
            - uuid: ec3ac4fb300845919da40c656296e3b3
              expression: 'avg(/Extreme Switch SNMP/net.if.in.util[{#IFNAME}],5m)>{$IF_UTIL_WARN} or avg(/Extreme Switch SNMP/net.if.out.util[{#IFNAME}],5m)>{$IF_UTIL_WARN}'
              name: 'High bandwidth utilization on interface {#IFNAME} on {HOST.NAME}'
              priority: WARNING
            - uuid: 8ef017197e8e4ffab19b1fbc6c5c54f6
              expression: 'avg(/Extreme Switch SNMP/net.if.in.errors[{#IFNAME}],5m)>{$IF_ERRORS_WARN} or avg(/Extreme Switch SNMP/net.if.out.errors[{#IFNAME}],5m)>{$IF_ERRORS_WARN}'
              name: 'High error rate on interface {#IFNAME} on {HOST.NAME}'
              priority: WARNING
      tags:
        - tag: class
          value: software
        - tag: target
          value: extreme
        - tag: target
          value: switch
      macros:
        - macro: '{$CPU_HIGH}'
          value: '95'
        - macro: '{$CPU_WARN}'
          value: '80'
        - macro: '{$IF_ERRORS_WARN}'
          value: '10'
        - macro: '{$IF_UTIL_WARN}'
          value: '80'
        - macro: '{$MEM_HIGH}'
          value: '95'
        - macro: '{$MEM_WARN}'
          value: '80'
        - macro: '{$SNMP_COMMUNITY}'
      valuemaps:
        - uuid: daaa8a894f074452b003d015f3140c17
          name: 'IF-MIB::ifOperStatus'
          mappings:
            - value: '1'
              newvalue: up
            - value: '2'
              newvalue: down
            - value: '3'
              newvalue: testing
            - value: '5'
              newvalue: dormant
            - value: '7'
              newvalue: lowerLayerDown
