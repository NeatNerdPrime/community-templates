zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: e960332b3f6c46a1956486d4f3f99fce
      name: 'Templates/Server hardware'
  templates:
    - uuid: c73b0f6848294fe49931d51b94736b48
      template: 'HP BladeSystem Superdome Enclosure by SNMP'
      name: 'HP BladeSystem Superdome Enclosure by SNMP'
      description: |
        Template for HP BladeSystem / Superdome Enclosure (CPQRACK-MIB)
        Generated by script.
      groups:
        - name: 'Templates/Server hardware'
      items:
        - uuid: 27cb4ce08a084871bc05b1d27f7a2012
          name: 'SNMP walk Blade Servers table'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.232.22.2.4.1.1.1.4,1.3.6.1.4.1.232.22.2.4.1.1.1.17,1.3.6.1.4.1.232.22.2.4.1.1.1.21]'
          key: hp.enc.blades.walk
          history: '0'
          value_type: TEXT
          trends: '0'
          tags:
            - tag: component
              value: raw
        - uuid: 0b43af5213804c8799df90f1e9745a83
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'hp.enc.contact[sysContact]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          tags:
            - tag: component
              value: system
        - uuid: 202c5ed704c34b588411650368495787
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'hp.enc.descr[sysDescr]'
          delay: 1h
          value_type: CHAR
          trends: '0'
          tags:
            - tag: component
              value: system
        - uuid: 8b664122f2814f29862955070f1ce71c
          name: 'SNMP walk Chassis Fans table'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.232.22.2.3.1.3.1.5,1.3.6.1.4.1.232.22.2.3.1.3.1.8,1.3.6.1.4.1.232.22.2.3.1.3.1.11]'
          key: hp.enc.fan.walk
          history: '0'
          value_type: TEXT
          trends: '0'
          tags:
            - tag: component
              value: raw
        - uuid: 0d0146b529f945ffaaa16268d48ced19
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'hp.enc.location[sysLocation]'
          delay: 15m
          value_type: CHAR
          trends: '0'
          tags:
            - tag: component
              value: system
        - uuid: eb275d2517a544f3b976f316ba57e67b
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: 'hp.enc.name[sysName]'
          delay: 15m
          value_type: CHAR
          trends: '0'
          tags:
            - tag: component
              value: system
        - uuid: 50cd36b4b62b4474b0323b1d76866310
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.6.3.10.2.1.3.0]'
          key: 'hp.enc.net.uptime[snmpEngineTime]'
          delay: 60s
          value_type: FLOAT
          trends: '0'
          units: uptime
          tags:
            - tag: component
              value: system
        - uuid: f6addc5dafd64c129bbe75135e6bd59c
          name: 'System object ID'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.2.0]'
          key: 'hp.enc.objectid[sysObjectID]'
          delay: 15m
          value_type: CHAR
          trends: '0'
          tags:
            - tag: component
              value: system
        - uuid: 5b615b6baea1428396283ee8d7c1c2ad
          name: 'SNMP walk Power Supply table'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.232.22.2.5.1.1.1.5,1.3.6.1.4.1.232.22.2.5.1.1.1.6,1.3.6.1.4.1.232.22.2.5.1.1.1.9,1.3.6.1.4.1.232.22.2.5.1.1.1.14]'
          key: hp.enc.psu.walk
          history: '0'
          value_type: TEXT
          trends: '0'
          tags:
            - tag: component
              value: raw
        - uuid: 94a0a5ec07fa4915a4d66bf708c3b9a1
          name: 'Overall Enclosure Health Status'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.232.22.2.3.1.1.1.16.1]'
          key: 'hp.enc.status[cpqRackCommonEnclosureCondition]'
          delay: 2m
          value_type: FLOAT
          trends: '0'
          description: cpqRackCommonEnclosureCondition
          valuemap:
            name: 'HP-MIB::StatusEnum'
          tags:
            - tag: component
              value: health
          triggers:
            - uuid: ba7c934c12fb44929334160f1cb8ecae
              expression: 'last(/HP BladeSystem Superdome Enclosure by SNMP/hp.enc.status[cpqRackCommonEnclosureCondition])=3'
              name: 'HP Enclosure: Health is Degraded'
              priority: AVERAGE
              tags:
                - tag: scope
                  value: availability
            - uuid: 1ffbf33bb1e8465d8d933ed8df07d6b1
              expression: 'last(/HP BladeSystem Superdome Enclosure by SNMP/hp.enc.status[cpqRackCommonEnclosureCondition])=4'
              name: 'HP Enclosure: Health is Failed'
              priority: HIGH
              tags:
                - tag: scope
                  value: availability
        - uuid: e2db914124f643b7986b719b5738ec82
          name: 'SNMP walk Chassis Temp table'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.232.22.2.3.1.2.1.5,1.3.6.1.4.1.232.22.2.3.1.2.1.6,1.3.6.1.4.1.232.22.2.3.1.2.1.7,1.3.6.1.4.1.232.22.2.3.1.2.1.8]'
          key: hp.enc.temp.walk
          history: '0'
          value_type: TEXT
          trends: '0'
          tags:
            - tag: component
              value: raw
        - uuid: f0e24a62451c4b52bde1ad6129b57bdd
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          delay: '0'
          value_type: LOG
          trends: '0'
          tags:
            - tag: component
              value: network
        - uuid: 2bfbcaa5d23441f485abdff85df7f16c
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          value_type: FLOAT
          trends: '0'
          description: 'Availability of SNMP checks on the host. 0=not available, 1=available, 2=unknown'
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: component
              value: system
          triggers:
            - uuid: 990f955f5bfe47d2b171cde48358fa98
              expression: 'max(/HP BladeSystem Superdome Enclosure by SNMP/zabbix[host,snmp,available],5m)=0'
              name: 'HP Enclosure: No SNMP data collection'
              priority: WARNING
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: c203c8455fcc42149694f2256630de41
          name: 'Blade Server discovery'
          type: DEPENDENT
          key: hp.enc.blade.discovery
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#BLADE_NAME}'
                value: ^Unknown$
                operator: NOT_MATCHES_REGEX
                formulaid: A
          item_prototypes:
            - uuid: f1c1e5817d094583a79c5a3235cd86e1
              name: 'Blade [{#BLADE_NAME}]: Model'
              type: DEPENDENT
              key: 'hp.enc.blade.model[{#SNMPINDEX}]'
              delay: '0'
              value_type: CHAR
              trends: '0'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.232.22.2.4.1.1.1.17.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: hp.enc.blades.walk
              tags:
                - tag: component
                  value: system
            - uuid: ad8924f154544356809540996d1509e0
              name: 'Blade [{#BLADE_NAME}]: Status'
              type: DEPENDENT
              key: 'hp.enc.blade.status[{#SNMPINDEX}]'
              delay: '0'
              value_type: FLOAT
              valuemap:
                name: 'HP-MIB::StatusEnum'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.232.22.2.4.1.1.1.21.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: hp.enc.blades.walk
              tags:
                - tag: component
                  value: system
          master_item:
            key: hp.enc.blades.walk
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#BLADE_NAME}'
                - 1.3.6.1.4.1.232.22.2.4.1.1.1.4
                - '0'
        - uuid: f0083ddff0734efbb4c2c15f96e7e2e3
          name: 'Fan discovery'
          type: DEPENDENT
          key: hp.enc.fan.discovery
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#LOC}'
                value: ^$
                operator: NOT_MATCHES_REGEX
                formulaid: A
          item_prototypes:
            - uuid: f7e5c26191a748c89fbb4095293d7e91
              name: 'Fan [{#LOC}]: Condition'
              type: DEPENDENT
              key: 'hp.enc.fan.condition[{#SNMPINDEX}]'
              delay: '0'
              value_type: FLOAT
              valuemap:
                name: 'HP-MIB::StatusEnum'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.232.22.2.3.1.3.1.11.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: hp.enc.fan.walk
              tags:
                - tag: component
                  value: cooling
              trigger_prototypes:
                - uuid: b8aab6db8c13447a806f0d4eb38f45a0
                  expression: 'last(/HP BladeSystem Superdome Enclosure by SNMP/hp.enc.fan.condition[{#SNMPINDEX}])=4'
                  name: 'HP Enclosure: Fan [{#LOC}] is Failed'
                  priority: HIGH
          master_item:
            key: hp.enc.fan.walk
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#LOC}'
                - 1.3.6.1.4.1.232.22.2.3.1.3.1.5
                - '0'
        - uuid: c4ced97801514a9ab6637dac8f4dc25d
          name: 'Power Supply discovery'
          type: DEPENDENT
          key: hp.enc.psu.discovery
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#SN}'
                value: ^$
                operator: NOT_MATCHES_REGEX
                formulaid: A
          item_prototypes:
            - uuid: 024296895c9e46c89b38593e1a788623
              name: 'PSU [{#SN}]: Max Watts'
              type: DEPENDENT
              key: 'hp.enc.psu.maxwatts[{#SNMPINDEX}]'
              delay: '0'
              value_type: FLOAT
              units: W
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.232.22.2.5.1.1.1.9.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: hp.enc.psu.walk
              tags:
                - tag: component
                  value: power
            - uuid: 73592d3283574b779b3b933ed38d3027
              name: 'PSU [{#SN}]: Status'
              type: DEPENDENT
              key: 'hp.enc.psu.status[{#SNMPINDEX}]'
              delay: '0'
              value_type: FLOAT
              valuemap:
                name: 'HP-MIB::PSUStatusEnum'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.232.22.2.5.1.1.1.14.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: hp.enc.psu.walk
              tags:
                - tag: component
                  value: power
              trigger_prototypes:
                - uuid: d5bd1934e2e941a3b1e0a786dfa6f299
                  expression: 'last(/HP BladeSystem Superdome Enclosure by SNMP/hp.enc.psu.status[{#SNMPINDEX}])>1'
                  name: 'HP Enclosure: PSU [{#SN}] has an error'
                  priority: HIGH
          master_item:
            key: hp.enc.psu.walk
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#SN}'
                - 1.3.6.1.4.1.232.22.2.5.1.1.1.5
                - '0'
        - uuid: 83bb07f8b77d431b86a14e6234a4bf77
          name: 'Temp discovery'
          type: DEPENDENT
          key: hp.enc.temp.discovery
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#LOC}'
                value: ^$
                operator: NOT_MATCHES_REGEX
                formulaid: A
          item_prototypes:
            - uuid: 2ddff4fbca91450e88747446a40da83a
              name: 'Temp [{#LOC} #{#SNMPINDEX}]: Condition'
              type: DEPENDENT
              key: 'hp.enc.temp.condition[{#SNMPINDEX}]'
              delay: '0'
              value_type: FLOAT
              valuemap:
                name: 'HP-MIB::StatusEnum'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.232.22.2.3.1.2.1.8.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: hp.enc.temp.walk
              tags:
                - tag: component
                  value: temperature
              trigger_prototypes:
                - uuid: 2eea2366000d4d35a4bf8f33de69ae4d
                  expression: 'last(/HP BladeSystem Superdome Enclosure by SNMP/hp.enc.temp.condition[{#SNMPINDEX}])=4'
                  name: 'HP Enclosure: Temp [{#LOC} #{#SNMPINDEX}] is Failed'
                  priority: HIGH
            - uuid: a2619cfb134f485badf2a45cab9247b7
              name: 'Temp [{#LOC} #{#SNMPINDEX}]: Current'
              type: DEPENDENT
              key: 'hp.enc.temp.current[{#SNMPINDEX}]'
              delay: '0'
              value_type: FLOAT
              units: C
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.232.22.2.3.1.2.1.6.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: hp.enc.temp.walk
              tags:
                - tag: component
                  value: temperature
          master_item:
            key: hp.enc.temp.walk
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#LOC}'
                - 1.3.6.1.4.1.232.22.2.3.1.2.1.5
                - '0'
      tags:
        - tag: class
          value: hardware
        - tag: target
          value: dell
        - tag: target
          value: idrac
      valuemaps:
        - uuid: fc8d587ca46f4b31b8aec6d2ebf7be66
          name: 'HP-MIB::PSUStatusEnum'
          mappings:
            - value: '1'
              newvalue: noError
            - value: '2'
              newvalue: generalFailure
            - value: '3'
              newvalue: bistFailure
            - value: '4'
              newvalue: fanFailure
            - value: '5'
              newvalue: tempFailure
        - uuid: 0822b2bca8254f269f4eec5e059eefa1
          name: 'HP-MIB::StatusEnum'
          mappings:
            - value: '1'
              newvalue: Other
            - value: '2'
              newvalue: Ok
            - value: '3'
              newvalue: Degraded
            - value: '4'
              newvalue: Failed
        - uuid: 2b16ec1854f54d1e827a8d3fb5a10e9f
          name: zabbix.host.available
          mappings:
            - value: '0'
              newvalue: 'not available'
            - value: '1'
              newvalue: available
            - value: '2'
              newvalue: unknown
